name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Build Signed Foss Release
        run: |
          # Decode the keystore to the repo root
          echo "${{ secrets.RELEASE_STORE_FILE }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

          # Pass the absolute path so Gradle resolves it correctly regardless
          # of which module's project directory is the working context
          ./gradlew assembleFossRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/foss/release/*.apk
          if-no-files-found: error
          archive: false
